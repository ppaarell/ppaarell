name: GitHub-Profile-Summary-Cards

on:
  schedule:
    # Berjalan otomatis setiap jam 00:00 (tengah malam) untuk memperbarui data
    - cron: "0 0 * * *"
  workflow_dispatch: # Mengizinkan kamu menjalankan script ini secara manual kapan saja

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v3
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
